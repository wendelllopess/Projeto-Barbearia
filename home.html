<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,200;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <title>Inicio</title>
</head>
<body>
  
  <header>
        <nav>
            <a href="home.html">
              <img src="assents/casa.png" alt="home" class="incones">
            </a>

            <a href="Agendamentos.html">
              <img src="assents/calendario.png" alt="agendamento" class="incones">
            </a>

            <a href="Contato.html">
              <img src="assents/virar-telefone.png" alt="Contato" class="incones">
            </a>

            <a href="index.html">
              <img src="assents/saida.png" alt="sair" class="incones">
            </a>
        </nav>
  </header>
 
  <section>

    <h2>Agenda</h2>
    
    <div class="card" id="cardCabelo">
        <img src="assents/cabelo.png" alt="cabelo" id="cabelo">
        <label for="cabelo">Cabelo</label>
    </div>
   
   <div class="card" id="cardBarba">
        <img src="assents/barba.png" alt="barda" id="barba">
        <label for="barba">Barba</label>
   </div>

    <div class="card" id="cardBarbaCabelo">
        <img src="assents/cabeloEbarba.png" alt="barbaCabelo" id="barbaCabelo">
        <label for="barbaCabelo">Cabelo e Barba</label>
    </div>

  </section>
  
  <!--Modal dos cards -->
  
  <div id="modal" class="modal">
    <span class="fecharModal" id="BotaoFecharModal">&times;</span>
    <div class="conteudoModal">

      <h2 class="agendamento">Agendamento</h2>
        <form action="#">
         
          <label class="labelModal" for="nomeAgendamento">Nome do cliente</label>
            <input type="text" name="nomeAgendamento" id="nomeAgendamento">
            
            <label class="labelModal"  for="dataAgendamento">Que dia deseja?</label>
            <input type="date" id="dataAgendamento">

            <label class="labelModal"  for="horaioAgendamento">Qual horario deseja?</label>
            <input type="time" id="horaioAgendamento">

            <label class="labelModal"  for="profissional">Qual profissional?</label>
            <select name="profisional" id="profisional">
              <option value="" selected >Selecione um profisional:</option>
              <option value="wendell">wendell</option>
              <option value="joaquin">joaquin</option>
              <option value="zeze">zeze</option>
            </select>

            
            <button type="submit" id="butaoAgendamento" >Agendar</button>
        </form>
      
    </div>
  </div>


  <footer>
    <p>Agende agora seu corte e fique com o belo na regua!</p>
  </footer>\

  <script src="./Inicio.js"></script>
</body>
</html>
