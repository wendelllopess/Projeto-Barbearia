<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,200;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="inicio.css">
    <title>Inicio</title>
</head>
<body>
  <style>
    * {
    margin: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    /*
   background-color: rgb(9, 7, 7);
    */
    background: linear-gradient(60deg, #1045b9 30%, #3a078bf5);
    height: 100vh; 
    margin: 0; 
    overflow: hidden;
  }
  
  @media only screen and (max-width: 600px) {
    body {
      height: 100%;
      overflow: visible;
    }
  }



header {
    background-color: rgba(36, 36, 36, 0.548);
    padding: 10px;
    text-align: center;
}

nav {
    display: flex;
    justify-content: center;
    margin-top: 5px;
}

nav a {
    text-decoration: none;
    color: #ffffff;
    padding: 10px;
    margin: 0 10px;
}

@media only screen and (max-width: 600px) {
    nav {
        flex-direction: column;
        align-items: center;
    }

    nav a {
        margin: 5px 0;
    }
}

section {
    display: flex;
    justify-content: space-around;
    align-items: center;
    flex-wrap: wrap;
    padding: 20px;
 
}

h2 {
    color: #ffffff;
    text-align: center;
    margin: 0 auto; 
    position: relative; 
    width: 100%;
    border: 3px solid rgb(10, 10, 10);
    background-color: rgba(36, 36, 36, 0.856);
    border-radius: 8px;
   
}

@media only screen and (min-width: 600px) {
    h2 {
        top: 0; 
    }
}

.card {
    
    border-radius: 35px;
    background-color: rgba(36, 36, 36, 0.301);
    border: 4px solid rgba(10, 10, 10, 0.646);
    text-align: center;
    margin-top: 10px;
    margin-left: 5px;
    margin-right: 5px;
    flex: 1;
    cursor: pointer;
    
}

.card img {
    max-width: 100%;
    height: 350px;
    width: 350px;
    display: block;
    margin: 0 auto;
    margin-top: 30px;
}

.card label {
    width: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: row;
    margin-top: 5px;
    margin-bottom: 12px;
    color:#000000;
    text-transform: uppercase;
    font-size: 22px;
    border: 1px solid black;
    border-width: 1px;
    
}

@media only screen and (max-width: 600px) {
    .card {
        flex: 1 0 100%; 
        margin-top: 15px;
       
    }

    .card img{
        width: 200px;
        height: 200px;
    }

}

footer {
    background-color: rgba(36, 36, 36, 0.637);
    text-align: center;
    padding: 10px;
    position: fixed;
    bottom: 0;
    margin-bottom: 0;
    color: #ffffff;
    width: 100%;
}

@media only screen and (max-width: 600px) {
    footer {
        position: static;
       
    }
}

.modal{
    display: none;
    position: fixed;
    top: 130px;
    left: 0;
    border: 3px solid rgb(31, 31, 31);
    height: 400px;
    width: 90%;
    margin-left: 40px;
    padding: 20px;
    padding-top: 2px;
    background: linear-gradient(60deg, #1045b9, #3a078bf5 70%);
    box-shadow: 3px 5px 30px rgba(255, 0, 0, 0.36);
    border-radius: 10px;
    
}

@media only screen and (max-width: 600px) {
   .modal{
    margin-left: 15px;
    top: 90px;
   }
}

.conteudoModal{

    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 10px;
    padding-top: 2px;

}

.fecharModal{
    display: flex;
    justify-content: end;
    align-items: center;
    height: 30px;
    font-size: 35px;
    font-weight: bold;
    align-items: center;
    cursor: pointer;
}


.agendamento{
    background-color: rgba(18, 19, 19, 0.854);
    border: 2px solid rgba(25, 26, 27, 0.596);
    border-radius: 5px;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 50px;
    margin-top: 3px;
    margin-bottom: 25px;
    padding: 10px;
    padding-bottom: 2px;
}
  
input {
    height: 40px;
    width: 100%;
    margin-bottom: 25px;
    margin-top: 15px;
    padding: 5px;
    background-color:rgba(8, 8, 8, 0.324);
    border: 3px solid rgb(8, 8, 8);
    border-radius: 8px;
    border-top: none;
    border-left: none;
    outline: none;
    color:#000000;
    font-size: 16px;
    font-style: none;

}


button {
    height: 50px;
    width: 100%;
    margin-top: 1rem;
    background-color:  rgb(0, 0, 0) ;
    color:#ffffff;
    font-size: 15px;
    text-align: center;
    text-decoration: none;
    text-transform: uppercase;
    border: 1px solid black;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background-color: rgb(25, 26, 27);
}

  </style>
  <header>
        <nav>
            <a href="Contato.html">Contato</a>
            <a href="Agendamentos.html">Meus agendamentos</a>
            <a href="login.html">Sair</a>
        </nav>
  </header>
 
  <section>

    <h2>Agenda</h2>
    
    <div class="card" id="cardCabelo">
        <img src="../assents/cabelo.png" alt="cabelo" id="cabelo">
        <label for="cabelo">Cabelo</label>
    </div>
   
   <div class="card" id="cardBarba">
        <img src="../assents/barba.png" alt="barda" id="barba">
        <label for="barba">Barba</label>
   </div>

    <div class="card" id="cardBarbaCabelo">
        <img src="../assents/cabeloEbarba.png" alt="barbaCabelo" id="barbaCabelo">
        <label for="barbaCabelo">Cabelo e Barba.</label>
    </div>

  </section>
  
  <!--Modal dos cards -->
  
  <div id="modal" class="modal">
    <span class="fecharModal" id="BotaoFecharModal">&times;</span>
    <div class="conteudoModal">

      <h2 class="agendamento">Agendamento</h2>
        <form action="#">
         
          <label for="nomeAgendamento">Nome do cliente</label>
            <input type="text" name="nomeAgendamento" id="nomeAgendamento">
            
            <label for="dataAgendamento">Que dia deseja?</label>
            <input type="datetime-local" id="dataAgendamento">

        
            
            <button type="submit" id="butaoAgendamento" >Agendar</button>
        </form>
      
    </div>
  </div>


  <footer>
    <p>Agende agora seu corte e fique com o belo na regua!</p>
  </footer>\

  <script>
     const cards = document.querySelectorAll('.card');
  const modal = document.getElementById('modal');
  const BotaoFecharModal = document.getElementById('BotaoFecharModal');

  cards.forEach(card => {
      card.addEventListener('click', ()=> {
          modal.style.display = 'block';
      });
  });

  BotaoFecharModal.addEventListener('click', ()=> {
      modal.style.display = 'none';
  });

 


  </script>
  <!--script src="./Inicio.js"></script>-->
</body>
</html>
