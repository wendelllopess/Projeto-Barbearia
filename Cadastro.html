<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Cadastro.css">
    <title>Cadastro</title>
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h2 class="bemvindo">Cadastro</h2>
        </header>
        
            <form action="">
                <input type="text" class="nome" name="nome" id="nome" placeholder="Nome Completo">
                <input type="text" class="cpf" placeholder="CPF">
                <input type="email" class="email" name="email" id="email" placeholder="Email">
                <input type="tel" class="telefone" name ="telefone" id="telefone" placeholder="Telefone" >
                <input type="password" class="senha" name="senha" id="senha" placeholder="Senha">
                <input type="password" class="senhaConfirmacao" name="senhaConfirmacao" id="senhaConfirmacao" placeholder="Confirme sua senha">

                <button type="submit" id="Botao-login"><a href="./login.html">Cadastre-se</a></button>
            </form>
    </div>
</body>
</html>
